    <style>
        :root {
            --bg-color: #ffffff;
            --border-color: #333333;
            --text-color: #111111;

            --incorrect-flash: rgba(231, 76, 60, 0.3);

            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            transition: background-color 0.2s ease;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--border-color);
            color: #ffffff;
        }

        .quiz-container {
            width: 100%;
            max-width: 650px;
        }

        .progress {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #666;
        }

        .box-phrase {
            background-color: #ffffff;
            border: 3px solid var(--border-color);
            padding: 2rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 2rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .instruction {
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 1rem;
            color: #444;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 2rem;
        }

        .option-card {
            background: #ffffff;
            border: 2px solid #ccc;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        .option-card:hover {
            border-color: var(--border-color);
        }

        .option-card.selected {
            background-color: #111111;
            color: #ffffff;
            border-color: #111111;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--bg-color);
            border: 3px solid var(--border-color);
            color: var(--border-color);
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: var(--border-color);
            color: #ffffff;
        }

        body.flash-correct {
            background-color: var(--correct-flash);
        }

        body.flash-incorrect {
            background-color: var(--incorrect-flash);
        }
    </style>
</head>

                    options: ["La cause", "La conséquence", "Le but", "L'opposition"],
                    answers: ["La conséquence"]
                },
                {
                    text: "« J'entends les oiseaux [chanter dans les bois]. » Quelle est la nature de la proposition entre crochets ?",
                    options: ["Proposition subordonnée infinitive", "Proposition subordonnée relative", "Proposition subordonnée participiale", "Proposition coordonnée"],
                    answers: ["Proposition subordonnée infinitive"]
                },
                {
                    text: "« Il est indispensable que vous [sachiez] votre leçon. » À quel temps et mode est le verbe entre crochets ?",
                    options: ["Subjonctif présent", "Indicatif présent", "Conditionnel présent", "Subjonctif imparfait"],
                    answers: ["Subjonctif présent"]
                },
                {
                    text: "« Si j'avais su, je [serais venu] plus tôt. » À quel temps et mode est le verbe entre crochets ?",
                    options: ["Conditionnel passé", "Conditionnel présent", "Indicatif plus-que-parfait", "Subjonctif passé"],
                    answers: ["Conditionnel passé"]
                },
                {
                    text: "« À peine fut-il arrivé [qu'il dut repartir]. » Quelle est la nature de la proposition entre crochets ?",
                    options: ["Subordonnée circonstancielle de temps", "Subordonnée circonstancielle de conséquence", "Subordonnée conjonctive complétive", "Subordonnée relative"],
                    answers: ["Subordonnée circonstancielle de temps"]
                },
                {
                    text: "« L'élève [dont je t'ai parlé] a eu 20 au Bac de français. » Quel est le mot subordonnant entre crochets ?",
                    options: ["Pronom relatif", "Conjonction de subordination", "Adverbe interrogatif", "Pronom personnel"],
                    answers: ["Pronom relatif"]
                },
                {
                    text: "« Je crains qu'il ne [vienne]. » Comment s'appelle le 'ne' employé ici ?",
                    options: ["Ne explétif", "Ne de négation totale", "Ne de négation restrictive", "Ne discordant"],
                    answers: ["Ne explétif"]
                },
                {
                    text: "« Il n'a [guère] apprécié la remarque. » Quelle nuance apporte l'adverbe entre crochets ?",
                    options: ["Une négation proche de 'presque pas'", "Une négation totale", "Une affirmation atténuée", "Une restriction"],
                    answers: ["Une négation proche de 'presque pas'"]
                },
                {
                    text: "« Je veux [que tu lises ce roman de Balzac]. » Quelle est la nature de la proposition entre crochets ?",
                    options: ["Subordonnée conjonctive complétive", "Subordonnée relative", "Subordonnée circonstancielle", "Proposition principale"],
                    answers: ["Subordonnée conjonctive complétive"]
                },
                {
                    text: "« Soudain, le rideau s'ouvrit. Un homme [entra]. » Quelle est la valeur du passé simple ici ?",
                    options: ["Action ponctuelle et de premier plan", "Action secondaire", "Action simultanée", "Action de second plan"],
                    answers: ["Action ponctuelle et de premier plan"]
                },
                {
                    text: "« Il s'installa au bureau pendant que la pluie [tombait]. » Quelle est la valeur de l'imparfait ici ?",
                    options: ["Action d'arrière-plan / Description", "Action brève", "Action répétitive", "Présent du passé"],
                    answers: ["Action d'arrière-plan / Description"]
                }
            ]
        };

        let currentTab = 'figures';
        let currentIndex = 0;
        let selectedAnswers = [];

        const phraseDisplay = document.getElementById('phrase-display');
        const optionsDisplay = document.getElementById('options-display');
        const progressText = document.getElementById('progress-text');
        const body = document.body;

        function loadQuestion() {
            selectedAnswers = [];
            const questions = dataset[currentTab];
            
            if (currentIndex >= questions.length) {
                currentIndex = 0; 
            }

            const currentQuestion = questions[currentIndex];
            
            phraseDisplay.innerText = currentQuestion.text;
            progressText.innerText = `Question ${currentIndex + 1} / ${questions.length}`;

            optionsDisplay.innerHTML = '';
            currentQuestion.options.forEach(option => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = option;
                card.onclick = () => toggleSelectOption(card, option);
                optionsDisplay.appendChild(card);
            });
        }

        function toggleSelectOption(card, option) {
            if (selectedAnswers.includes(option)) {
                selectedAnswers = selectedAnswers.filter(item => item !== option);
                card.classList.remove('selected');
            } else {
                selectedAnswers.push(option);
                card.classList.add('selected');
            }
        }

        function validateAnswer() {
            const currentQuestion = dataset[currentTab];
            const correctAnswers = currentQuestion[currentIndex].answers;

            const isCorrect = selectedAnswers.length === correctAnswers.length && 
                              selectedAnswers.every(val => correctAnswers.includes(val));

            document.getElementById('submit-btn').disabled = true;

            if (isCorrect) {
                body.classList.add('flash-correct');
            } else {
                body.classList.add('flash-incorrect');
            }

            setTimeout(() => {
                body.classList.remove('flash-correct', 'flash-incorrect');
                document.getElementById('submit-btn').disabled = false;
                currentIndex++;
                loadQuestion();
            }, 800);
        }

        function switchTab(tabName) {
            if (currentTab === tabName) return;
            currentTab = tabName;
            currentIndex = 0;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = event.target;
            activeBtn.classList.add('active');

            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
