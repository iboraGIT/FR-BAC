<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac de Français — Entraînement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0C1526;
            --surface:   #111D2E;
            --surface2:  #192435;
            --border:    #1E2E44;
            --gold:      #C9A64C;
            --gold-dim:  rgba(201,166,76,0.15);
            --gold-glow: rgba(201,166,76,0.25);
            --text:      #EDE5D4;
            --muted:     #6A7E9A;
            --green:     #2DA878;
            --green-bg:  rgba(45,168,120,0.12);
            --red:       #C94040;
            --red-bg:    rgba(201,64,64,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 4rem;
        }

        /* ── Header ─────────────────────────────────── */
        header {
            width: 100%;
            max-width: 680px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 0.35rem;
        }

        .logo-bar {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold));
        }
        .logo-bar.right {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .subtitle {
            font-size: 0.72rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1.6rem;
        }

        .tabs {
            display: inline-flex;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .tab-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            padding: 0.65rem 1.4rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn:last-child { border-right: none; }

        .tab-btn.active {
            background: var(--gold);
            color: #0C1526;
        }

        .tab-btn:not(.active):hover {
            background: var(--surface2);
            color: var(--text);
        }

        /* ── Stats bar ───────────────────────────────── */
        .stats-bar {
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .stat-val {
            font-family: 'DM Mono', monospace;
            color: var(--text);
            font-size: 0.88rem;
        }

        .streak-val { color: var(--gold); font-weight: 700; }

        .stats-sep {
            width: 1px;
            height: 14px;
            background: var(--border);
            margin: 0 0.3rem;
        }

        .progress-counter {
            margin-left: auto;
            font-family: 'DM Mono', monospace;
            font-size: 0.76rem;
            color: var(--muted);
        }

        /* ── Progress bar ────────────────────────────── */
        .progress-track {
            width: 100%;
            max-width: 680px;
            height: 2px;
            background: var(--border);
            margin-bottom: 1.6rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
            width: 0%;
        }

        /* ── Quiz area ───────────────────────────────── */
        #quiz-area {
            width: 100%;
            max-width: 680px;
        }

        /* ── Question card ───────────────────────────── */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem 2.2rem;
            margin-bottom: 1.2rem;
            transition: border-color 0.3s, background 0.3s;
            position: relative;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--gold);
            opacity: 0.4;
        }

        .question-card.flash-correct {
            border-color: var(--green);
            background: var(--green-bg);
        }
        .question-card.flash-correct::before { background: var(--green); opacity: 1; }

        .question-card.flash-wrong {
            border-color: var(--red);
            background: var(--red-bg);
        }
        .question-card.flash-wrong::before { background: var(--red); opacity: 1; }

        .question-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            line-height: 1.75;
            color: var(--text);
        }

        /* ── Hint ────────────────────────────────────── */
        .hint {
            min-height: 1.3rem;
            font-size: 0.76rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .hint.visible { opacity: 1; }

        /* ── Options grid ────────────────────────────── */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            text-align: left;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--text);
            width: 100%;
        }

        .option-card:hover:not(.disabled) {
            border-color: #334563;
            background: var(--surface2);
        }

        .option-card.selected {
            border-color: var(--gold);
            background: var(--gold-dim);
        }

        .option-card.reveal-correct {
            border-color: var(--green);
            background: var(--green-bg);
            color: #5DD4A8;
        }

        .option-card.reveal-wrong {
            border-color: var(--red);
            background: var(--red-bg);
            color: #E07878;
        }

        .option-card.disabled { cursor: default; }

        .key-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .option-card.selected .key-badge {
            border-color: var(--gold);
            color: var(--gold);
        }

        .option-card.reveal-correct .key-badge {
            border-color: var(--green);
            color: var(--green);
        }

        .option-card.reveal-wrong .key-badge {
            border-color: var(--red);
            color: var(--red);
        }

        /* ── Feedback message ────────────────────────── */
        .feedback-msg {
            min-height: 1.2rem;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.8rem;
            font-style: italic;
        }

        /* ── Submit button ───────────────────────────── */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Outfit', sans-serif;
            font-size: 0.83rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--gold);
            color: #0C1526;
        }

        .btn-submit:disabled { opacity: 0.4; cursor: default; }

        .btn-submit.state-correct {
            border-color: var(--green);
            color: var(--green);
        }
        .btn-submit.state-wrong {
            border-color: var(--red);
            color: var(--red);
        }

        /* ── Keyboard hint ───────────────────────────── */
        .kb-hint {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            color: var(--border);
        }

        /* ── End screen ──────────────────────────────── */
        #end-screen {
            display: none;
            width: 100%;
            max-width: 680px;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem 2rem;
        }

        .end-emoji {
            font-size: 2.8rem;
            margin-bottom: 0.8rem;
        }

        .end-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 0.4rem;
        }

        .end-subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2.2rem;
        }

        .end-stats {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .end-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .end-stat-num {
            font-family: 'DM Mono', monospace;
            font-size: 2.2rem;
            color: var(--text);
            line-height: 1;
        }

        .end-stat-label {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .end-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-end {
            padding: 0.75rem 1.6rem;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-end:hover {
            background: var(--gold);
            color: #0C1526;
        }

        .btn-end.secondary {
            border-color: var(--border);
            color: var(--muted);
        }

        .btn-end.secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        /* ── Animations ──────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim-in {
            animation: fadeUp 0.25s ease forwards;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-5px); }
            40%      { transform: translateX(5px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        .shake { animation: shake 0.35s ease; }
    </style>
</head>
<body>

    <header>
        <div class="logo-line">
            <div class="logo-bar"></div>
            <span class="logo-text">Bac de Français</span>
            <div class="logo-bar right"></div>
        </div>
        <div class="subtitle">Entraînement · Révision · Réussite</div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="figures" onclick="switchTab('figures')">Figures de style</button>
            <button class="tab-btn" data-tab="grammaire" onclick="switchTab('grammaire')">Grammaire</button>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-group">
            <span>Score</span>
            <span class="stat-val" id="score-display">0&nbsp;/&nbsp;0</span>
        </div>
        <div class="stats-sep"></div>
        <div class="stat-group">
            <span>🔥</span>
            <span class="stat-val streak-val" id="streak-display">0</span>
        </div>
        <span class="progress-counter" id="progress-text">1 / —</span>
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Quiz -->
    <div id="quiz-area">
        <div class="question-card" id="question-card">
            <p class="question-text" id="phrase-display">Chargement…</p>
        </div>

        <div class="hint" id="multi-hint">⚑ Plusieurs réponses possibles</div>

        <div class="options-grid" id="options-display"></div>

        <div class="feedback-msg" id="feedback-msg"></div>

        <button class="btn-submit" id="submit-btn" onclick="validateAnswer()">
            Valider la réponse
        </button>

        <div class="kb-hint">Touches 1–4 pour sélectionner &nbsp;·&nbsp; Entrée pour valider</div>
    </div>

    <!-- End screen -->
    <div id="end-screen">
        <div class="end-emoji" id="end-emoji">🎉</div>
        <div class="end-title">Entraînement terminé !</div>
        <div class="end-subtitle" id="end-tab-name">Figures de style</div>
        <div class="end-stats">
            <div class="end-stat">
                <span class="end-stat-num" id="end-score">—</span>
                <span class="end-stat-label">Score final</span>
            </div>
            <div class="end-stat">
                <span class="end-stat-num" id="end-pct">—</span>
                <span class="end-stat-label">Réussite</span>
            </div>
            <div class="end-stat">
                <span class="end-stat-num" id="end-streak">—</span>
                <span class="end-stat-label">Meilleure série</span>
            </div>
        </div>
        <div class="end-actions">
            <button class="btn-end" onclick="restartSession()">Recommencer</button>
            <button class="btn-end secondary" onclick="switchTabFromEnd()">Changer de section</button>
        </div>
    </div>

    <script>
    /* ═══════════════════════════════════════════════
       DATASET
    ═══════════════════════════════════════════════ */
    const dataset = {
        figures: [
            { text: "« Pour qui sont ces serpents qui sifflent sur vos têtes ? » (Racine, Andromaque)", options: ["Allitération","Assonance","Oxymore","Litote"], answers: ["Allitération"] },
            { text: "« La Cigale, ayant chanté / Tout l'été… » (La Fontaine)", options: ["Personnification","Allégorie","Comparaison","Oxymore"], answers: ["Personnification"] },
            { text: "« Un vieillard en oripeaux, un mendiant transi, un spectre de misère »", options: ["Accumulation","Gradation","Anaphore","Chiasme"], answers: ["Accumulation","Gradation"] },
            { text: "« Ce garçon n'est pas un idiot. »", options: ["Litote","Euphémisme","Antiphrase (Ironie)","Hyperbole"], answers: ["Litote"] },
            { text: "« Le Roi-Soleil » (pour désigner Louis XIV)", options: ["Périphrase","Antonomase","Métaphore","Métonymie"], answers: ["Périphrase","Antonomase"] },
            { text: "« Des éclairs de joie, des tonnerres d'applaudissements, une tempête de cris »", options: ["Métaphore","Comparaison","Personnification","Litote"], answers: ["Métaphore"] },
            { text: "« Les arbres gémissaient sous la tempête. »", options: ["Personnification","Allégorie","Métaphore","Comparaison"], answers: ["Personnification"] },
            { text: "« Je verserai un torrent de sang pour me venger. »", options: ["Hyperbole","Métaphore","Litote","Antithèse"], answers: ["Hyperbole"] },
            { text: "« Un silence éloquent s'installa entre les deux rivaux. »", options: ["Oxymore","Antithèse","Chiasme","Périphrase"], answers: ["Oxymore"] },
            { text: "« Le poète est comme l'albatros, voyageur ailé. »", options: ["Comparaison","Métaphore","Personnification","Allégorie"], answers: ["Comparaison"] },
            { text: "« Boire la coupe jusqu'à la lie. »", options: ["Métonymie","Synecdoque","Métaphore","Périphrase"], answers: ["Métonymie"] },
            { text: "« Sa décision n'est pas mauvaise. » (pour dire qu'elle est bonne)", options: ["Litote","Euphémisme","Antiphrase (Ironie)","Hyperbole"], answers: ["Litote"] },
            { text: "« Les forces de l'ordre sont intervenues rapidement. » (pour désigner les policiers)", options: ["Périphrase","Métonymie","Métaphore","Antonomase"], answers: ["Périphrase"] },
            { text: "« Quel beau temps ! » (alors qu'il pleut à torrents)", options: ["Antiphrase (Ironie)","Oxymore","Litote","Euphémisme"], answers: ["Antiphrase (Ironie)"] },
            { text: "« Elle a versé des pleurs, des larmes, des torrents de désespoir. »", options: ["Gradation","Accumulation","Chiasme","Anaphore"], answers: ["Gradation","Accumulation"] },
            { text: "« La ville lumière attire les touristes du monde entier. » (La ville lumière pour Paris)", options: ["Périphrase","Métaphore","Métonymie","Synecdoque"], answers: ["Périphrase"] },
            { text: "« Un mort-vivant errait dans les couloirs du château. »", options: ["Oxymore","Antithèse","Périphrase","Hyperbole"], answers: ["Oxymore"] },
            { text: "« Un vent à décorner les bœufs soufflait sur la falaise. »", options: ["Hyperbole","Métaphore","Personnification","Litote"], answers: ["Hyperbole"] },
            { text: "« Le cœur a ses raisons que la raison ne connaît point. » (Pascal)", options: ["Antithèse","Oxymore","Chiasme","Parallélisme"], answers: ["Antithèse"] },
            { text: "« Un roi chantait en bas, en haut mourait un dieu. » (Hugo)", options: ["Chiasme","Antithèse","Oxymore","Anaphore"], answers: ["Chiasme","Antithèse"] },
            { text: "« La Faucheuse vient de frapper à sa porte. » (La Faucheuse pour la Mort)", options: ["Allégorie","Périphrase","Comparaison","Litote"], answers: ["Allégorie","Périphrase"] },
            { text: "« Il a dévoré tout le dictionnaire pour son examen. »", options: ["Hyperbole","Métonymie","Métaphore","Euphémisme"], answers: ["Hyperbole","Métonymie"] },
            { text: "« Ses cheveux d'or flottaient au vent. »", options: ["Métaphore","Comparaison","Périphrase","Personnification"], answers: ["Métaphore"] },
            { text: "« L'or noir est au cœur des tensions géopolitiques. » (L'or noir pour le pétrole)", options: ["Périphrase","Métaphore","Synecdoque","Oxymore"], answers: ["Périphrase","Métaphore"] },
            { text: "« Sous le ciel de nacre, la mer de satin s'endormait. »", options: ["Métaphore","Personnification","Comparaison","Hyperbole"], answers: ["Métaphore","Personnification"] },
            { text: "« C'est du propre ! Regarde l'état de ta chambre ! »", options: ["Antiphrase (Ironie)","Litote","Euphémisme","Oxymore"], answers: ["Antiphrase (Ironie)"] },
            { text: "« Les vagues montaient jusqu'aux cieux. »", options: ["Hyperbole","Métaphore","Personnification","Litote"], answers: ["Hyperbole"] },
            { text: "« L'éternel entretien de la terre et du ciel » (Hugo)", options: ["Personnification","Antithèse","Oxymore","Chiasme"], answers: ["Personnification","Antithèse"] },
            { text: "« Un wagon de livres encombrait son bureau. »", options: ["Hyperbole","Métaphore","Métonymie","Comparaison"], answers: ["Hyperbole","Métaphore"] },
            { text: "« Cette petite grande âme venait de s'envoler. » (Hugo)", options: ["Oxymore","Antithèse","Euphémisme","Litote"], answers: ["Oxymore","Euphémisme"] },
            { text: "« Prête-moi tes oreilles un instant. »", options: ["Métonymie","Synecdoque","Métaphore","Périphrase"], answers: ["Métonymie"] },
            { text: "« L'océan de tes yeux m'engloutit. »", options: ["Métaphore","Comparaison","Périphrase","Oxymore"], answers: ["Métaphore"] },
            { text: "« Mon bras qu'avec respect toute l'Afrique admire… » (Corneille, Le Cid)", options: ["Métonymie","Synecdoque","Personnification","Hyperbole"], answers: ["Métonymie"] },
            { text: "« Elle est partie pour le grand voyage. » (Pour annoncer un décès)", options: ["Euphémisme","Litote","Antithèse","Périphrase"], answers: ["Euphémisme"] },
            { text: "« Les sanglots longs / Des violons / De l'automne… » (Verlaine)", options: ["Personnification","Oxymore","Chiasme","Litote"], answers: ["Personnification"] },
            { text: "« C'est un génie, il a raté tous ses examens ! »", options: ["Antiphrase (Ironie)","Hyperbole","Oxymore","Litote"], answers: ["Antiphrase (Ironie)"] },
            { text: "« Un bruit à réveiller les morts ! »", options: ["Hyperbole","Métaphore","Personnification","Antithèse"], answers: ["Hyperbole"] },
            { text: "« Jamais si près du ciel, jamais si loin de toi. »", options: ["Parallélisme","Antithèse","Chiasme","Oxymore"], answers: ["Parallélisme","Antithèse"] },
            { text: "« Le soleil noir de la Mélancolie » (Gérard de Nerval)", options: ["Oxymore","Antithèse","Périphrase","Comparaison"], answers: ["Oxymore"] },
            { text: "« Le fer a tué plus d'hommes que la peste. » (Le fer pour désigner l'épée)", options: ["Métonymie","Synecdoque","Métaphore","Euphémisme"], answers: ["Métonymie"] },
            { text: "« La capitale de la mode » (Pour désigner Paris)", options: ["Périphrase","Métaphore","Antonomase","Hyperbole"], answers: ["Périphrase"] },
            { text: "« Hâtez-vous lentement. » (Boileau)", options: ["Oxymore","Antithèse","Litote","Chiasme"], answers: ["Oxymore"] },
            { text: "« Des milliers d'étoiles scintillaient, des millions de phares s'allumaient. »", options: ["Parallélisme","Hyperbole","Chiasme","Gradation"], answers: ["Parallélisme","Hyperbole"] },
            { text: "« Mourir de rire. »", options: ["Hyperbole","Métaphore","Litote","Euphémisme"], answers: ["Hyperbole"] },
            { text: "« Ses yeux étaient deux sources vives. »", options: ["Métaphore","Comparaison","Périphrase","Personnification"], answers: ["Métaphore"] },

            { text: "« Il est tellement fatigué [qu'il s'est endormi sur sa copie]. » Quelle relation logique est exprimée ?", options: ["La conséquence","La cause","L'opposition","Le but"], answers: ["La conséquence"] },
            { text: "« [Bien que] Phèdre sache son amour interdit, elle le confesse. » Quel est le rôle de la locution entre crochets ?", options: ["Introduire une concession","Introduire une cause","Introduire une condition","Introduire un but"], answers: ["Introduire une concession"] },
            { text: "« [Quoiqu'il] fasse des efforts, ses résultats stagnent. » Quelle est la relation logique introduite par le mot entre crochets ?", options: ["La cause","La conséquence","La concession","Le but"], answers: ["La concession"] },
            { text: "« Je ne vois [personne] dans la rue. » De quel type de négation s'agit-il ?", options: ["Négation totale","Négation partielle","Négation restrictive","Négation lexicale"], answers: ["Négation partielle"] },
            { text: "« Dis-moi [où tu as caché ce livre]. » Quelle est la nature de la proposition entre crochets ?", options: ["Subordonnée interrogative indirecte","Subordonnée relative","Subordonnée conjonctive complétive","Proposition principale"], answers: ["Subordonnée interrogative indirecte"] },
            { text: "« Tous les matins, il [prenait] le même chemin. » Quelle est la valeur de l'imparfait entre crochets ?", options: ["L'habitude / La répétition","La description","L'action secondaire","La condition"], answers: ["L'habitude / La répétition"] },
            { text: "« L'arbre [qui se trouve au centre du jardin] a été planté par mon grand-père. » Quelle est la fonction exacte de cette proposition ?", options: ["Complément de l'antécédent 'arbre'","Complément d'objet direct (COD)","Sujet","Complément circonstanciel"], answers: ["Complément de l'antécédent 'arbre'"] },
            { text: "« Elle [n']a [que] seize ans. » Comment s'appelle cette structure négative ?", options: ["Négation totale","Négation partielle","Négation restrictive (ou exceptive)","Négation inversée"], answers: ["Négation restrictive (ou exceptive)"] },
            { text: "« Soudain, la porte s'ouvrit : le chevalier [entre]. » Quelle est la valeur du présent entre crochets ?", options: ["Présent de vérité générale","Présent de narration","Présent d'énonciation","Présent d'habitude"], answers: ["Présent de narration"] },
            { text: "« Je sais [que tu as révisé toute la nuit]. » Quelle est la nature de la proposition entre crochets ?", options: ["Subordonnée conjonctive complétive","Subordonnée relative","Subordonnée circonstancielle","Proposition principale"], answers: ["Subordonnée conjonctive complétive"] },
            { text: "« [Comme] il était fatigué, il est allé se coucher tôt. » Quelle relation logique est exprimée par ce mot ?", options: ["La cause","La comparaison","Le temps","La conséquence"], answers: ["La cause"] },
            { text: "« Le candidat [dont] je t'ai parlé a réussi son oral. » Quelle est la classe grammaticale précise de 'dont' ?", options: ["Conjonction de subordination","Pronom relatif","Pronom interrogatif","Adverbe de liaison"], answers: ["Pronom relatif"] },
            { text: "« Je t'explique la règle afin que tu [puisses] l'appliquer. » À quel mode est conjugué le verbe entre crochets ?", options: ["Indicatif","Subjonctif","Conditionnel","Impératif"], answers: ["Subjonctif"] },
            { text: "« Viendras-tu au théâtre avec nous ce soir ? » De quel type d'interrogation s'agit-il ?", options: ["Interrogation totale","Interrogation partielle","Interrogation indirecte","Interrogation alternative"], answers: ["Interrogation totale"] },
            { text: "« Il s'attend à [ce que tu viennes]. » Quelle est la fonction de la proposition subordonnée entre crochets ?", options: ["Complément d'objet indirect (COI)","Complément d'objet direct (COD)","Sujet","Complément du nom"], answers: ["Complément d'objet indirect (COI)"] },
            { text: "« Il a tant plu [que la rivière a débordé]. » Quelle relation logique est exprimée par la subordonnée entre crochets ?", options: ["La cause","La conséquence","Le but","L'opposition"], answers: ["La conséquence"] },
            { text: "« J'entends les oiseaux [chanter dans les bois]. » Quelle est la nature de la proposition entre crochets ?", options: ["Proposition subordonnée infinitive","Proposition subordonnée relative","Proposition subordonnée participiale","Proposition coordonnée"], answers: ["Proposition subordonnée infinitive"] },
            { text: "« Il est indispensable que vous [sachiez] votre leçon. » À quel temps et mode est le verbe entre crochets ?", options: ["Subjonctif présent","Indicatif présent","Conditionnel présent","Subjonctif imparfait"], answers: ["Subjonctif présent"] },
            { text: "« Si j'avais su, je [serais venu] plus tôt. » À quel temps et mode est le verbe entre crochets ?", options: ["Conditionnel passé","Conditionnel présent","Indicatif plus-que-parfait","Subjonctif passé"], answers: ["Conditionnel passé"] },
            { text: "« À peine fut-il arrivé [qu'il dut repartir]. » Quelle est la nature de la proposition entre crochets ?", options: ["Subordonnée circonstancielle de temps","Subordonnée circonstancielle de conséquence","Subordonnée conjonctive complétive","Subordonnée relative"], answers: ["Subordonnée circonstancielle de temps"] },
            { text: "« Je crains qu'il ne [vienne]. » Comment s'appelle le 'ne' employé ici ?", options: ["Ne explétif","Ne de négation totale","Ne de négation restrictive","Ne discordant"], answers: ["Ne explétif"] },
            { text: "« Il n'a [guère] apprécié la remarque. » Quelle nuance apporte l'adverbe entre crochets ?", options: ["Une négation proche de 'presque pas'","Une négation totale","Une affirmation atténuée","Une restriction"], answers: ["Une négation proche de 'presque pas'"] },
            { text: "« Je veux [que tu lises ce roman de Balzac]. » Quelle est la nature de la proposition entre crochets ?", options: ["Subordonnée conjonctive complétive","Subordonnée relative","Subordonnée circonstancielle","Proposition principale"], answers: ["Subordonnée conjonctive complétive"] },
            { text: "« Soudain, le rideau s'ouvrit. Un homme [entra]. » Quelle est la valeur du passé simple ici ?", options: ["Action ponctuelle et de premier plan","Action secondaire","Action simultanée","Action de second plan"], answers: ["Action ponctuelle et de premier plan"] },
            { text: "« Il s'installa au bureau pendant que la pluie [tombait]. » Quelle est la valeur de l'imparfait ici ?", options: ["Action d'arrière-plan / Description","Action brève","Action répétitive","Présent du passé"], answers: ["Action d'arrière-plan / Description"] }
        ]
    };

    /* ═══════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════ */
    let currentTab   = 'figures';
    let questions    = [];
    let currentIndex = 0;
    let selected     = [];
    let score        = 0;
    let total        = 0;
    let streak       = 0;
    let bestStreak   = 0;
    let isAnswered   = false;

    /* ═══════════════════════════════════════════════
       UTILS
    ═══════════════════════════════════════════════ */
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    /* ═══════════════════════════════════════════════
       SESSION
    ═══════════════════════════════════════════════ */
    function startSession(tab) {
        currentTab   = tab;
        currentIndex = 0;
        selected     = [];
        score        = 0;
        total        = 0;
        streak       = 0;
        bestStreak   = 0;
        isAnswered   = false;
        questions    = shuffle(dataset[tab]);

        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display  = '';
        updateStats();
        loadQuestion();
    }

    function updateStats() {
        document.getElementById('score-display').textContent  = `${score} / ${total}`;
        document.getElementById('streak-display').textContent = streak;
    }

    /* ═══════════════════════════════════════════════
       LOAD QUESTION
    ═══════════════════════════════════════════════ */
    function loadQuestion() {
        isAnswered = false;
        selected   = [];

        const q = questions[currentIndex];

        // Progress
        document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${questions.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIndex / questions.length) * 100}%`;

        // Question
        const card = document.getElementById('question-card');
        card.className = 'question-card anim-in';
        card.addEventListener('animationend', () => card.classList.remove('anim-in'), { once: true });
        document.getElementById('phrase-display').textContent = q.text;

        // Multi-answer hint
        const hint = document.getElementById('multi-hint');
        hint.classList.toggle('visible', q.answers.length > 1);

        // Feedback message
        document.getElementById('feedback-msg').textContent = '';

        // Options (shuffled)
        const optionsEl = document.getElementById('options-display');
        optionsEl.innerHTML = '';
        const shuffledOpts = shuffle(q.options);

        shuffledOpts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-card';
            btn.dataset.option = text;

            const badge = document.createElement('span');
            badge.className = 'key-badge';
            badge.textContent = i + 1;

            const label = document.createElement('span');
            label.textContent = text;

            btn.appendChild(badge);
            btn.appendChild(label);
            btn.addEventListener('click', () => { if (!isAnswered) toggleOption(btn, text); });
            optionsEl.appendChild(btn);
        });

        // Submit button
        const btn = document.getElementById('submit-btn');
        btn.disabled  = false;
        btn.className = 'btn-submit';
        btn.textContent = 'Valider la réponse';
    }

    /* ═══════════════════════════════════════════════
       TOGGLE OPTION
    ═══════════════════════════════════════════════ */
    function toggleOption(card, option) {
        if (selected.includes(option)) {
            selected = selected.filter(o => o !== option);
            card.classList.remove('selected');
        } else {
            selected.push(option);
            card.classList.add('selected');
        }
    }

    /* ═══════════════════════════════════════════════
       VALIDATE
    ═══════════════════════════════════════════════ */
    function validateAnswer() {
        if (isAnswered) return;
        isAnswered = true;

        const q       = questions[currentIndex];
        const correct = q.answers;

        const isCorrect = selected.length === correct.length &&
                          selected.every(a => correct.includes(a));

        total++;
        if (isCorrect) {
            score++;
            streak++;
            if (streak > bestStreak) bestStreak = streak;
        } else {
            streak = 0;
        }

        updateStats();

        // Reveal options
        document.querySelectorAll('.option-card').forEach(card => {
            const opt = card.dataset.option;
            card.classList.add('disabled');
            if (correct.includes(opt)) {
                card.classList.remove('selected');
                card.classList.add('reveal-correct');
            } else if (selected.includes(opt)) {
                card.classList.remove('selected');
                card.classList.add('reveal-wrong');
            }
        });

        // Flash card
        const card = document.getElementById('question-card');
        card.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');

        // Feedback message
        const fb = document.getElementById('feedback-msg');
        if (!isCorrect) {
            fb.textContent = `Bonne${correct.length > 1 ? 's' : ''} réponse${correct.length > 1 ? 's' : ''} : ${correct.join(', ')}`;
        } else {
            fb.textContent = streak > 1 ? `🔥 Série de ${streak} bonne${streak > 1 ? 's' : ''} réponse${streak > 1 ? 's' : ''} !` : '';
        }

        // Submit button state
        const btn = document.getElementById('submit-btn');
        btn.className   = `btn-submit ${isCorrect ? 'state-correct' : 'state-wrong'}`;
        btn.textContent = isCorrect ? '✓  Correct !' : '✗  Incorrect';
        btn.disabled    = true;

        // Auto-advance
        setTimeout(() => {
            card.classList.remove('flash-correct', 'flash-wrong');
            currentIndex++;
            if (currentIndex >= questions.length) {
                showEndScreen();
            } else {
                loadQuestion();
            }
        }, 1800);
    }

    /* ═══════════════════════════════════════════════
       END SCREEN
    ═══════════════════════════════════════════════ */
    function showEndScreen() {
        document.getElementById('quiz-area').style.display  = 'none';
        document.getElementById('end-screen').style.display = 'flex';

        const pct   = total > 0 ? Math.round((score / total) * 100) : 0;
        const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
        const names = { figures: 'Figures de style', grammaire: 'Grammaire' };

        document.getElementById('end-emoji').textContent    = emoji;
        document.getElementById('end-tab-name').textContent = names[currentTab];
        document.getElementById('end-score').textContent    = `${score}/${total}`;
        document.getElementById('end-pct').textContent      = `${pct}%`;
        document.getElementById('end-streak').textContent   = bestStreak;

        // Animate progress bar to 100%
        document.getElementById('progress-fill').style.width = '100%';
    }

    function restartSession() { startSession(currentTab); }

    function switchTabFromEnd() {
        const other = currentTab === 'figures' ? 'grammaire' : 'figures';
        switchTab(other);
    }

    /* ═══════════════════════════════════════════════
       TAB SWITCH
    ═══════════════════════════════════════════════ */
    function switchTab(tab) {
        if (currentTab === tab && total === 0) return;
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === tab);
        });
        startSession(tab);
    }

    /* ═══════════════════════════════════════════════
       KEYBOARD
    ═══════════════════════════════════════════════ */
    document.addEventListener('keydown', e => {
        if (isAnswered) return;
        const num = parseInt(e.key);
        if (num >= 1 && num <= 4) {
            const cards = document.querySelectorAll('.option-card');
            if (cards[num - 1]) {
                const opt = cards[num - 1].dataset.option;
                toggleOption(cards[num - 1], opt);
            }
        }
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            validateAnswer();
        }
    });

    /* ── Init ─── */
    startSession('figures');
    </script>
</body>
